<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro × Notion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #e8d5b0;
    --accent2: #c4a882;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #c0392b;
    --work: #e8d5b0;
    --break: #8ec6a0;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px 48px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN CARD ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 36px 36px;
    margin-bottom: 16px;
  }

  /* mode tabs */
  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 36px;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px;
  }
  .mode-tab {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-align: center;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    color: var(--muted);
    background: none;
    transition: all 0.2s;
  }
  .mode-tab.active {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  /* timer */
  .timer-wrap {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
  }
  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 76px;
    font-weight: 300;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--work);
    transition: color 0.5s;
  }
  .timer-display.break-mode { color: var(--break); }

  /* progress bar */
  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin: 20px 0;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--work);
    border-radius: 1px;
    transition: width 0.5s linear, background 0.5s;
    width: 100%;
  }
  .progress-bar.break-mode { background: var(--break); }

  /* pomodoro dots */
  .pomo-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 12px;
  }
  .pomo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: none;
    transition: all 0.3s;
  }
  .pomo-dot.done { background: var(--accent); border-color: var(--accent); }

  /* controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .btn {
    padding: 12px 28px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0e0e0e;
    font-weight: 500;
    min-width: 100px;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TASK SECTION ── */
  .task-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .task-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    appearance: none;
    cursor: pointer;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .task-select:focus { border-color: var(--accent); }
  .task-select option { background: var(--surface); }

  .task-stats {
    display: flex;
    gap: 24px;
    margin-top: 8px;
  }
  .stat-item { font-size: 12px; color: var(--muted); }
  .stat-item span { color: var(--accent); font-family: 'DM Mono', monospace; }

  .fetch-btn {
    width: 100%;
    padding: 9px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .fetch-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SESSION LOG ── */
  .log-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .log-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: var(--radius);
  }
  .log-task { color: var(--text); }
  .log-meta { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 11px; }
  .log-saved { color: var(--break); font-size: 10px; margin-left: 8px; }
  .empty-log { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 0; }

  /* ── SETTINGS MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    width: 90%;
    max-width: 420px;
  }
  .modal h2 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* notify */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #0e0e0e;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo">🍅 Pomodoro × Notion</div>
  <button class="settings-btn" onclick="openSettings()">⚙ 設定</button>
</header>

<!-- TIMER CARD -->
<div class="card">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-work" onclick="switchMode('work')">WORK</button>
    <button class="mode-tab" id="tab-break" onclick="switchMode('break')">SHORT BREAK</button>
    <button class="mode-tab" id="tab-long" onclick="switchMode('long')">LONG BREAK</button>
  </div>

  <div class="timer-wrap">
    <div class="timer-label" id="timer-label">作業セッション</div>
    <div class="timer-display" id="timer-display">25:00</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="pomo-dots" id="pomo-dots"></div>
  </div>

  <div class="controls">
    <button class="btn btn-ghost" onclick="resetTimer()">リセット</button>
    <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">START</button>
  </div>
</div>

<!-- TASK SECTION -->
<div class="task-card">
  <div class="section-title">現在のタスク</div>
  <select class="task-select" id="task-select">
    <option value="">— タスクを選択 —</option>
  </select>
  <button class="fetch-btn" onclick="fetchTasks()">↻ Notionからタスクを取得</button>
  <div class="task-stats" id="task-stats" style="display:none">
    <div class="stat-item">合計作業時間: <span id="stat-total">0</span> 分</div>
    <div class="stat-item">本日の追加: <span id="stat-today">0</span> 分</div>
  </div>
</div>

<!-- SESSION LOG -->
<div class="log-card">
  <div class="section-title">セッションログ</div>
  <ul class="log-list" id="log-list">
    <li class="empty-log">まだセッションがありません</li>
  </ul>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Notion API 設定</h2>
    <div class="form-group">
      <label>Integration Token</label>
      <input type="password" id="input-token" placeholder="secret_xxxxxxxxxxxx">
    </div>
    <div class="form-group">
      <label>Database ID</label>
      <input type="text" id="input-dbid" placeholder="32文字のID">
    </div>
    <div class="form-group">
      <label>タスク名プロパティ名（Notionの列名）</label>
      <input type="text" id="input-nameprop" placeholder="Name">
    </div>
    <div class="form-group">
      <label>作業時間プロパティ名（Notionの列名）</label>
      <input type="text" id="input-timeprop" placeholder="合計時間（分）">
    </div>
    <div class="form-group">
      <label>作業時間 (分)</label>
      <input type="number" id="input-work" value="25" min="1" max="60">
    </div>
    <div class="form-group">
      <label>短い休憩 (分)</label>
      <input type="number" id="input-break" value="5" min="1" max="30">
    </div>
    <div class="form-group">
      <label>長い休憩 (分)</label>
      <input type="number" id="input-long" value="15" min="1" max="60">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeSettings()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────
let config = {
  token: '',
  dbId: '',
  nameProp: 'Name',
  timeProp: '合計時間（分）',
  workMin: 25,
  breakMin: 5,
  longMin: 15,
};

let mode = 'work'; // work | break | long
let totalSeconds = 25 * 60;
let remaining = totalSeconds;
let running = false;
let interval = null;
let pomoCount = 0;
let sessionAddedMin = 0; // minutes added this session

let tasks = [];
let selectedTask = null; // { id, name, currentTime }
let todayAdded = 0;

const PROXY = 'https://corsproxy.io/?';

// ── LOAD CONFIG ─────────────────────────────────────────
(function loadConfig() {
  const saved = localStorage.getItem('pomo-config');
  if (saved) {
    try { config = { ...config, ...JSON.parse(saved) }; } catch(e) {}
  }
  applyConfig();
  renderDots();
})();

function applyConfig() {
  const mins = { work: config.workMin, break: config.breakMin, long: config.longMin };
  totalSeconds = mins[mode] * 60;
  remaining = totalSeconds;
  updateDisplay();
  updateProgress();
}

// ── SETTINGS ───────────────────────────────────────────
function openSettings() {
  document.getElementById('input-token').value = config.token;
  document.getElementById('input-dbid').value = config.dbId;
  document.getElementById('input-nameprop').value = config.nameProp;
  document.getElementById('input-timeprop').value = config.timeProp;
  document.getElementById('input-work').value = config.workMin;
  document.getElementById('input-break').value = config.breakMin;
  document.getElementById('input-long').value = config.longMin;
  document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveSettings() {
  config.token = document.getElementById('input-token').value.trim();
  config.dbId = document.getElementById('input-dbid').value.trim();
  config.nameProp = document.getElementById('input-nameprop').value.trim() || 'Name';
  config.timeProp = document.getElementById('input-timeprop').value.trim() || '合計時間（分）';
  config.workMin = parseInt(document.getElementById('input-work').value) || 25;
  config.breakMin = parseInt(document.getElementById('input-break').value) || 5;
  config.longMin = parseInt(document.getElementById('input-long').value) || 15;
  localStorage.setItem('pomo-config', JSON.stringify(config));
  closeSettings();
  resetTimer();
  toast('設定を保存しました');
}

// ── MODE SWITCH ─────────────────────────────────────────
function switchMode(m) {
  if (running) return;
  mode = m;
  ['work','break','long'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === m);
  });
  const label = { work:'作業セッション', break:'短い休憩', long:'長い休憩' };
  document.getElementById('timer-label').textContent = label[m];
  const isBreak = m !== 'work';
  document.getElementById('timer-display').classList.toggle('break-mode', isBreak);
  document.getElementById('progress-bar').classList.toggle('break-mode', isBreak);
  applyConfig();
}

// ── TIMER ──────────────────────────────────────────────
function toggleTimer() {
  if (running) { pauseTimer(); } else { startTimer(); }
}

function startTimer() {
  running = true;
  document.getElementById('start-btn').textContent = 'PAUSE';
  interval = setInterval(tick, 1000);
}

function pauseTimer() {
  running = false;
  document.getElementById('start-btn').textContent = 'START';
  clearInterval(interval);
}

function resetTimer() {
  pauseTimer();
  applyConfig();
  sessionAddedMin = 0;
}

function tick() {
  if (remaining <= 0) {
    onSessionEnd();
    return;
  }
  remaining--;
  updateDisplay();
  updateProgress();
}

function updateDisplay() {
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

function updateProgress() {
  const pct = (remaining / totalSeconds) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function onSessionEnd() {
  pauseTimer();
  document.getElementById('start-btn').textContent = 'START';

  if (mode === 'work') {
    pomoCount++;
    renderDots();
    const addedMin = config.workMin;
    todayAdded += addedMin;
    updateStatDisplay();

    addLog(selectedTask ? selectedTask.name : '（タスク未選択）', addedMin);

    if (selectedTask && config.token && config.dbId) {
      await saveToNotion(selectedTask, addedMin);
    }

    // notify
    if (Notification.permission === 'granted') {
      new Notification('🍅 ポモドーロ完了！', { body: '休憩を取りましょう。' });
    }
    toast('✓ セッション完了！');

    // auto switch to break
    setTimeout(() => switchMode(pomoCount % 4 === 0 ? 'long' : 'break'), 800);
  } else {
    toast('休憩終了！作業を再開しましょう。');
    setTimeout(() => switchMode('work'), 800);
  }
}

function renderDots() {
  const wrap = document.getElementById('pomo-dots');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'pomo-dot' + (i < (pomoCount % 4 || (pomoCount > 0 && pomoCount % 4 === 0 ? 4 : 0)) ? ' done' : '');
    wrap.appendChild(d);
  }
}

// ── NOTION API ─────────────────────────────────────────
async function fetchTasks() {
  if (!config.token || !config.dbId) {
    toast('⚠ 設定からAPI情報を入力してください', true);
    openSettings();
    return;
  }
  const btn = document.querySelector('.fetch-btn');
  btn.textContent = '取得中...';
  try {
    const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${config.dbId}/query`);
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${config.token}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ page_size: 50 }),
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    tasks = data.results.map(page => {
      const titleProp = page.properties[config.nameProp];
      const timeProp = page.properties[config.timeProp];
      const name = titleProp?.title?.[0]?.plain_text || titleProp?.rich_text?.[0]?.plain_text || '(無題)';
      const currentTime = timeProp?.number || 0;
      return { id: page.id, name, currentTime };
    }).filter(t => t.name !== '(無題)' || true);

    populateSelect();
    toast(`✓ ${tasks.length}件取得しました`);
  } catch(e) {
    toast('取得失敗: ' + e.message, true);
  }
  btn.textContent = '↻ Notionからタスクを取得';
}

function populateSelect() {
  const sel = document.getElementById('task-select');
  sel.innerHTML = '<option value="">— タスクを選択 —</option>';
  tasks.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
  sel.onchange = () => onTaskSelect(sel.value);
}

function onTaskSelect(id) {
  selectedTask = tasks.find(t => t.id === id) || null;
  todayAdded = 0;
  updateStatDisplay();
}

function updateStatDisplay() {
  const wrap = document.getElementById('task-stats');
  if (selectedTask) {
    wrap.style.display = 'flex';
    document.getElementById('stat-total').textContent = selectedTask.currentTime + todayAdded;
    document.getElementById('stat-today').textContent = todayAdded;
  } else {
    wrap.style.display = 'none';
  }
}

async function saveToNotion(task, addedMin) {
  try {
    const newTotal = task.currentTime + addedMin;
    // update task's currentTime locally
    task.currentTime = newTotal;

    const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/pages/${task.id}`);
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${config.token}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        properties: {
          [config.timeProp]: { number: newTotal }
        }
      }),
    });
    if (!res.ok) throw new Error('save error ' + res.status);
    return true;
  } catch(e) {
    toast('Notion保存失敗: ' + e.message, true);
    return false;
  }
}

// ── LOG ────────────────────────────────────────────────
function addLog(taskName, min) {
  const list = document.getElementById('log-list');
  const empty = list.querySelector('.empty-log');
  if (empty) empty.remove();

  const now = new Date();
  const time = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });

  const li = document.createElement('li');
  li.className = 'log-item';
  li.innerHTML = `
    <span class="log-task">${taskName}</span>
    <span class="log-meta">${min}分 · ${time}
      ${selectedTask && config.token ? '<span class="log-saved">✓ 保存</span>' : ''}
    </span>`;
  list.prepend(li);
}

// ── TOAST ──────────────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

// Request notification permission
if (Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
</body>
</html>
